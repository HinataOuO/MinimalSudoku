<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apri Minimal Sudoku</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: #0a0a0a;
        color: #f2f2f2;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }
      main {
        width: min(28rem, calc(100% - 3rem));
        text-align: center;
      }
      a {
        display: block;
        margin-top: 1rem;
        padding: 0.9rem 1.2rem;
        border-radius: 0.4rem;
        background: #ffb547;
        color: #14100a;
        font-weight: 700;
        text-decoration: none;
      }
      p {
        color: #a3a3a3;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Partita Minimal Sudoku</h1>
      <p>Provo ad aprire app. Se non installata, scaricala da Google Play.</p>
      <a id="open-app" href="#">Apri app</a>
      <a href="https://play.google.com/store/apps/details?id=com.anonymous.minimalsudoku">
        Vai al Play Store
      </a>
    </main>
    <script>
      const game = new URLSearchParams(window.location.search).get("game");
      const appUrl = game
        ? `minimalsudoku://share?game=${encodeURIComponent(game)}`
        : "minimalsudoku://share";
      const openApp = document.getElementById("open-app");
      openApp.href = appUrl;
      window.setTimeout(() => {
        window.location.href = appUrl;
      }, 150);
    </script>
  </body>
</html>
